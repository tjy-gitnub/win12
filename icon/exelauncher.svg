<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2983cc"/>
      <stop offset="100%" style="stop-color:#1a5a9e"/>
    </linearGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect x="40" y="40" width="432" height="432" rx="60" ry="60" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- 文档/文件形状 -->
  <rect x="120" y="100" width="272" height="312" rx="12" ry="12" fill="#ffffff"/>
  <polygon points="120,160 180,100 180,160" fill="#e0e0e0"/>
  
  <!-- EXE 文本 -->
  <rect x="140" y="200" width="232" height="80" rx="8" ry="8" fill="#2983cc"/>
  <text x="256" y="255" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">EXE</text>
  
  <!-- 齿轮图标 -->
  <g transform="translate(256, 340)">
    <circle cx="0" cy="0" r="35" fill="url(#gearGrad)" stroke="#ff6b00" stroke-width="2"/>
    <circle cx="0" cy="0" r="15" fill="#2983cc"/>
    <!-- 齿轮齿 -->
    <rect x="-8" y="-45" width="16" height="20" rx="2" fill="url(#gearGrad)"/>
    <rect x="-8" y="25" width="16" height="20" rx="2" fill="url(#gearGrad)"/>
    <rect x="-45" y="-8" width="20" height="16" rx="2" fill="url(#gearGrad)"/>
    <rect x="25" y="-8" width="20" height="16" rx="2" fill="url(#gearGrad)"/>
    <rect x="-33" y="-33" width="16" height="16" rx="2" fill="url(#gearGrad)" transform="rotate(45)"/>
    <rect x="-33" y="17" width="16" height="16" rx="2" fill="url(#gearGrad)" transform="rotate(45)"/>
    <rect x="17" y="-33" width="16" height="16" rx="2" fill="url(#gearGrad)" transform="rotate(45)"/>
    <rect x="17" y="17" width="16" height="16" rx="2" fill="url(#gearGrad)" transform="rotate(45)"/>
  </g>
  
  <!-- 小装饰点 -->
  <circle cx="160" cy="145" r="6" fill="#2983cc"/>
  <circle cx="180" cy="145" r="6" fill="#2983cc"/>
  <circle cx="200" cy="145" r="6" fill="#2983cc"/>
</svg>