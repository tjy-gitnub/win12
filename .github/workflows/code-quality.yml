name: 代码质量检查

on:
  pull_request:
    branches: [main]
    paths:
      - '**.js'
      - '**.css'
      - '**.html'

jobs:
  lint:
    name: 语法检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 安装依赖
        run: |
          npm install --save-dev eslint stylelint htmlhint

      - name: 获取更改的文件
        id: changed-files
        run: |
          echo "changed_js=$(git diff --name-only origin/${{ github.base_ref }} HEAD | grep '\.js$' | tr '\n' ' ')" >> $GITHUB_OUTPUT
          echo "changed_css=$(git diff --name-only origin/${{ github.base_ref }} HEAD | grep '\.css$' | tr '\n' ' ')" >> $GITHUB_OUTPUT
          echo "changed_html=$(git diff --name-only origin/${{ github.base_ref }} HEAD | grep '\.html$' | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: ESLint (JS)
        run: |
          if [ -n "${{ steps.changed-files.outputs.changed_js }}" ]; then
            npx eslint ${{ steps.changed-files.outputs.changed_js }} --max-warnings=0
          fi
        continue-on-error: true

      - name: Stylelint (CSS)
        run: |
          if [ -n "${{ steps.changed-files.outputs.changed_css }}" ]; then
            npx stylelint ${{ steps.changed-files.outputs.changed_css }} --allow-empty-input --max-warnings=0
          fi
        continue-on-error: true

      - name: HTMLHint (HTML)
        run: |
          if [ -n "${{ steps.changed-files.outputs.changed_html }}" ]; then
            npx htmlhint ${{ steps.changed-files.outputs.changed_html }}
          fi
        continue-on-error: true
